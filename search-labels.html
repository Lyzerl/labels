<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חיפוש מדבקות - Priority</title>
<!-- PWA Meta Tags -->
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ביק הזמנות">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<!-- Preconnect לטעינה מהירה -->
<link rel="preconnect" href="https://priority-proxy.lyzer-64d.workers.dev" crossorigin>
<!-- ניווט משותף -->
<script src="js/nav.js" defer></script>
<!-- CSS משותף -->
<link rel="stylesheet" href="css/styles.css">
<!-- סגנונות ספציפיים לדף חיפוש -->
<style>
.container { max-width: 1200px; padding: 15px; }
@media (min-width: 768px) { .container { padding: 30px; } }

.search-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
@media (min-width: 768px) { .search-section { padding: 25px; margin-bottom: 30px; } }

.search-box { display: flex; flex-direction: column; gap: 10px; }
@media (min-width: 768px) { .search-box { flex-direction: row; } }

.search-input { width: 100%; padding: 14px 20px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px; transition: border-color 0.3s; }
@media (min-width: 768px) { .search-input { flex: 1; width: auto; padding: 12px 20px; } }
.search-input:focus { outline: none; border-color: #4285f4; }

.search-btn { width: 100%; padding: 14px 30px; background: #4285f4; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
@media (min-width: 768px) { .search-btn { width: auto; padding: 12px 30px; font-size: 16px; } }
.search-btn:hover:not(:disabled) { background: #3367d6; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(66, 133, 244, 0.3); }
.search-btn:disabled { background: #ccc; cursor: not-allowed; }

.results-info { background: #e3f2fd; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: none; }
.results-info.show { display: block; }

/* מבנה עמוד למדבקות */
.labels-container { margin-top: 30px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
.label-page { width: 210mm; height: 149mm; position: relative; margin: 0 auto 15px auto; page-break-after: always; background: white; }
.label-item { width: 210mm; height: 149mm; page-break-inside: avoid; break-inside: avoid; border: 2px solid #333; border-radius: 8px; overflow: hidden; background: white; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
.label-header { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 10px; background: #f5f5f5; padding: 8mm; border-bottom: 2px solid #333; flex-shrink: 0; }
.label-logo { display: flex; align-items: center; justify-content: center; }
.label-logo img { max-width: 100%; max-height: 65px; width: auto; height: auto; object-fit: contain; }
.label-customer { display: flex; flex-direction: column; justify-content: center; text-align: center; }
.label-customer-name { font-size: 22px; font-weight: bold; margin-bottom: 5px; }
.label-customer-code { font-size: 17px; color: #666; }
.label-date { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.label-date-label { font-size: 15px; color: #666; margin-bottom: 3px; }
.label-date-value { font-size: 20px; font-weight: bold; }
.label-boxes { padding: 8mm; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.label-box-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex: 1; overflow: hidden; }
.label-box { border: 1px solid #ddd; border-radius: 6px; padding: 8px; background: #fafafa; display: flex; flex-direction: column; overflow: hidden; }
.label-box-hot { border-color: #ff6b6b; background: #fff5f5; }
.label-box-cold { border-color: #4dabf7; background: #f0f7ff; }
.label-box-name { font-weight: bold; font-size: 14px; margin-bottom: 8px; color: #333; border-bottom: 1px solid #ddd; padding-bottom: 5px; }
.label-box-items { font-size: 13px; line-height: 1.6; flex: 1; overflow-y: auto; }
.label-box-item { padding: 3px 0; border-bottom: 1px dotted #e0e0e0; }
.label-box-item:last-child { border-bottom: none; }
.label-footer { background: #f5f5f5; padding: 6mm; text-align: center; border-top: 2px solid #333; flex-shrink: 0; }
.label-notes { font-size: 13px; color: #666; margin-bottom: 5px; }
.label-delivery { font-size: 14px; font-weight: bold; color: #333; }

@media print {
    @page { size: A5 landscape; margin: 0; }
    body { background: white; padding: 0; margin: 0; }
    .container { box-shadow: none; padding: 0; margin: 0; max-width: 100%; }
    .main-nav, .search-section, .status, .results-info, h1 { display: none !important; }
    .labels-container { gap: 0; margin: 0; padding: 0; }
    .label-page { width: 210mm; height: 149mm; margin: 0; page-break-after: always; page-break-inside: avoid; }
    .label-item { width: 210mm; height: 149mm; margin: 0; page-break-inside: avoid; page-break-after: always; border: 2px solid #000; box-shadow: none; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .label-item:last-child { page-break-after: auto; }
    .label-box-hot, .label-box-cold { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

@media screen and (max-width: 768px) {
    .label-page { width: 100%; height: auto; margin-bottom: 20px; }
    .label-item { width: 100%; height: auto; min-height: auto; }
    .label-header { grid-template-columns: 1fr; gap: 15px; padding: 15px; }
    .label-logo { order: 1; }
    .label-customer { order: 2; }
    .label-date { order: 3; }
    .label-boxes { padding: 15px; }
    .label-box-row { grid-template-columns: 1fr 1fr; gap: 10px; }
    .label-footer { padding: 15px; }
    .label-customer-name { font-size: 16px; }
    .label-customer-code { font-size: 13px; }
    .label-date-value { font-size: 14px; }
    .label-box { padding: 10px; }
    .label-box-name { font-size: 13px; }
    .label-box-items { font-size: 12px; }
}
</style>
</head>
<body>

<div class="container">
    <!-- תפריט ניווט משותף -->
    <nav id="main-nav"></nav>

    <h1>🔍 חיפוש מהיר למדבקות</h1>

    <div class="search-section">
        <div style="margin-bottom: 15px;">
            <label for="dateInput" style="font-weight: bold; margin-left: 10px;">תאריך:</label>
            <input type="date" id="dateInput" style="padding: 10px; font-size: 16px; border: 2px solid #ddd; border-radius: 8px;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
            <div>
                <label for="customerCodeInput" style="font-weight: bold; display: block; margin-bottom: 5px;">מספר לקוח:</label>
                <input type="text"
                       id="customerCodeInput"
                       class="search-input"
                       placeholder="הקלד מספר לקוח..."
                       onkeypress="if(event.key==='Enter') searchLabels()"
                       style="width: 100%;">
            </div>
            <div>
                <label for="customerNameInput" style="font-weight: bold; display: block; margin-bottom: 5px;">שם לקוח:</label>
                <input type="text"
                       id="customerNameInput"
                       class="search-input"
                       placeholder="הקלד שם לקוח..."
                       onkeypress="if(event.key==='Enter') searchLabels()"
                       style="width: 100%;">
            </div>
        </div>

        <button class="search-btn" onclick="searchLabels()" id="searchBtn" style="width: 100%;">
            🔍 חפש
        </button>
    </div>

    <div id="status"></div>

    <div id="resultsInfo" class="results-info"></div>

    <div id="labelsContainer" class="labels-container"></div>
</div>

<!-- טעינת קונפיגורציה משותפת -->
<script src="js/config.js"></script>
<script>
// PROXY_URL מגיע מ-config.js

// הגדרת תאריך ברירת מחדל להיום
window.addEventListener('DOMContentLoaded', function() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateInput').value = today;
    document.getElementById('customerCodeInput').focus();
});

// פונקציית חיפוש ראשית - עם פילטר ישירות בשרת
async function searchLabels() {
    const dateInput = document.getElementById('dateInput');
    const customerCodeInput = document.getElementById('customerCodeInput');
    const customerNameInput = document.getElementById('customerNameInput');

    const selectedDate = dateInput.value;
    const customerCode = customerCodeInput.value.trim();
    const customerName = customerNameInput.value.trim();

    // בדיקה שיש לפחות ערך אחד
    if (!customerCode && !customerName) {
        showStatus('אנא הזן מספר לקוח או שם לקוח', 'error');
        return;
    }

    if (!selectedDate) {
        showStatus('אנא בחר תאריך', 'error');
        return;
    }

    document.getElementById('searchBtn').disabled = true;

    try {
        showStatus('מחפש בשרת...', 'loading');

        // הוספת פילטר לפי מספר לקוח (CUSTNAME) ו/או שם לקוח (CUSTDES)
        const extraFilters = [];
        if (customerCode) {
            extraFilters.push(`CUSTNAME eq '${customerCode}'`);
        }
        if (customerName) {
            extraFilters.push(`CUSTDES eq '${customerName}'`);
        }

        // משיכה דרך helper משותף - $orderby, retry, אימות
        const result = await fetchPriorityData({
            date: selectedDate,
            branchSelect: 'all',
            extraFilters: extraFilters,
            retries: 2
        });

        const results = result.data;

        // הצגת אזהרות אימות אם יש (לוג בלבד - לא מפריע לחיפוש לקוח ספציפי)
        if (result.issues && result.issues.length > 0 && typeof console.error === 'function') {
            console.error('אזהרות אימות בחיפוש:', result.issues);
        }

        if (results.length === 0) {
            showStatus('לא נמצאו תוצאות לחיפוש זה', 'error');
            document.getElementById('labelsContainer').innerHTML = '';
            hideResultsInfo();
            return;
        }

        // אישור עם מידע על אימות הספירה
        let successMsg = `✅ נמצאו ${results.length} הזמנות`;
        if (result.countVerified === true) {
            successMsg += ` (אומת מול השרת: ${results.length}/${result.expectedCount})`;
        } else if (result.expectedCount !== null && result.countVerified === false) {
            const diff = result.expectedCount - results.length;
            showStatus(`❌ אי-התאמה: נמשכו ${results.length} מתוך ${result.expectedCount} צפויות (חסרות ${diff}). נסה שוב.`, 'error');
            return;
        }
        showStatus(successMsg, 'success');
        displayLabels(results);

    } catch (error) {
        console.error('שגיאה בחיפוש:', error);
        showStatus(`❌ שגיאה: ${error.message}`, 'error');
    } finally {
        document.getElementById('searchBtn').disabled = false;
    }
}

// הצגת מדבקות
function displayLabels(orders) {
    // קיבוץ לפי לקוח וכיתה
    const groupedByCustomer = {};

    orders.forEach(order => {
        const customerKey = `${order.CUSTNAME}_${order.CODEDES}_${order.CUSTDES}`;
        const className = order.PRIT_CLASSNAME || 'אחר';

        if (!groupedByCustomer[customerKey]) {
            groupedByCustomer[customerKey] = {
                customerName: order.CUSTNAME,
                customerCode: order.CODEDES,
                siteDesc: order.CUSTDES,
                dueDate: order.DUEDATE,
                kashrutType: order.SPEC2 || '',
                address: order.ADDRESS || order.CUSTADDRESS || '',
                distrLine: order.DISTRLINEDES || '',
                distrOrder: order.PRIT_DISTRORDER || '',
                packingMethod: order.PRIT_PACKINGMETHODDES || '',
                classes: {}  // כיתות
            };
        }

        if (!groupedByCustomer[customerKey].classes[className]) {
            groupedByCustomer[customerKey].classes[className] = {
                hotItems: {},   // פריטים חמים - מיפוי לפי שם הפריט
                coldItems: {},  // פריטים קרים - מיפוי לפי שם הפריט
                portionCount: parseFloat(order.PRIT_GENQUANT) || 0 // מספר מנות - לוקחים פעם אחת בלבד
            };
        }

        const itemName = (order.PARTDES || '').trim();
        const itemQuantity = order.TQUANT || '';
        const temperature = (order.PSPEC6 || '').trim();
        const category = (order.PSPEC7 || '').trim().toLowerCase();

        // בדיקה אם הפריט ללא אלרגנים - בודקים גם ב-PSPEC7 וגם ב-ALLERGENS
        const isAllergenFree = category.includes('ללא אלרגנים') ||
                               (order.ALLERGENS || '').toLowerCase().includes('ללא אלרגנים');

        if (itemName) {
            const itemData = {
                name: itemName,
                quantity: itemQuantity,
                isAllergenFree: isAllergenFree
            };

            // הוספה לרשימה המתאימה לפי טמפרטורה
            // בדיקה מדויקת יותר - אם מכיל "חם" או "חבד" (חם בד"ץ) ולא "קר"
            const isHot = (temperature.includes('חם') || temperature.includes('חבד')) && !temperature.includes('קר');

            if (isHot) {
                // אם הפריט כבר קיים, לא נוסיף אותו שוב (איחוד כפילויות)
                if (!groupedByCustomer[customerKey].classes[className].hotItems[itemName]) {
                    groupedByCustomer[customerKey].classes[className].hotItems[itemName] = itemData;
                }
            } else {
                if (!groupedByCustomer[customerKey].classes[className].coldItems[itemName]) {
                    groupedByCustomer[customerKey].classes[className].coldItems[itemName] = itemData;
                }
            }
        }
    });

    // יצירת HTML למדבקות
    let html = '';
    let totalLabels = 0;

    Object.values(groupedByCustomer).forEach(customer => {
        // כל כיתה תקבל מדבקה נפרדת
        Object.entries(customer.classes).forEach(([className, classData]) => {
            totalLabels++;
            html += generateLabelHTML(customer, className, classData);
        });
    });

    document.getElementById('labelsContainer').innerHTML = html;
    showResultsInfo(totalLabels);
}

// יצירת HTML למדבקה בודדת
function generateLabelHTML(customer, className, classData) {
    // קביעת לוגו לפי כשרות (מתוך SPEC2)
    let logoPath = 'images/בדץ.png';
    let kashrutText = customer.kashrutType || 'בהשגחת הבד"ץ ירושלים';

    // בדיקה לפי הטקסט המדויק ב-SPEC2
    if (kashrutText.includes('מהדרין צפת') || kashrutText.includes('ביסטריצקי')) {
        logoPath = 'images/דבק ביסטריצקי.jpg';
    } else if (kashrutText.includes('ירוסלבסקי')) {
        logoPath = 'images/לוגו ירוסלבסקי.jpg';
    } else if (kashrutText.includes('בד"ץ') || kashrutText.includes('בדץ')) {
        logoPath = 'images/בדץ.png';
    }

    // פורמט תאריך
    const formattedDate = formatDate(customer.dueDate);

    let html = `
        <div class="label-page">
        <div class="label-item">
            <div class="label-header">
                <div class="label-logo">
                    <img src="${logoPath}" alt="${kashrutText}"
                         onerror="this.style.display='none'">
                </div>
                <div class="label-customer">
                    <div class="label-customer-name">${customer.customerCode || ''}</div>
                    ${customer.customerName ? `<div style="font-size: 15px; color: #888; margin-top: 2px;">${customer.customerName}</div>` : ''}
                    <div class="label-customer-code">${customer.siteDesc || ''}</div>
                    ${customer.address ? `<div style="font-size: 15px; color: #555; margin-top: 3px;">📍 ${customer.address}</div>` : ''}
                    <div style="font-size: 17px; color: #666; margin-top: 5px; font-weight: bold;">📚 ${className}</div>
                    ${customer.packingMethod ? `<div style="font-size: 17px; color: #FF9800; margin-top: 3px; font-weight: bold;">📦 ${customer.packingMethod}</div>` : ''}
                    ${classData.portionCount > 0 ? `<div style="font-size: 17px; color: #2196F3; margin-top: 3px; font-weight: bold;">🍽️ ${classData.portionCount} מנות</div>` : ''}
                </div>
                <div class="label-date">
                    <div class="label-date-label">תאריך אספקה:</div>
                    <div class="label-date-value">${formattedDate}</div>
                </div>
            </div>

            <div class="label-boxes">
                <div class="label-box-row">
                    <!-- עמודת פריטים חמים -->
                    <div class="label-box label-box-hot">
                        <div class="label-box-name">🔥 פריטים חמים</div>
                        <div class="label-box-items">
    `;

    // הוספת פריטים חמים
    const hotItemsArray = Object.values(classData.hotItems);
    if (hotItemsArray.length > 0) {
        hotItemsArray.forEach(item => {
            const displayText = `${item.quantity} ${item.name}`.trim();
            const style = item.isAllergenFree ? 'font-weight: bold; color: #4CAF50; background: #E8F5E9; padding: 2px 5px; border-radius: 3px;' : '';
            html += `<div class="label-box-item" style="${style}">${displayText}${item.isAllergenFree ? ' ✓' : ''}</div>`;
        });
    } else {
        html += `<div class="label-box-item" style="color: #999;">-</div>`;
    }

    html += `
                        </div>
                    </div>

                    <!-- עמודת פריטים קרים -->
                    <div class="label-box label-box-cold">
                        <div class="label-box-name">❄️ פריטים קרים</div>
                        <div class="label-box-items">
    `;

    // הוספת פריטים קרים
    const coldItemsArray = Object.values(classData.coldItems);
    if (coldItemsArray.length > 0) {
        coldItemsArray.forEach(item => {
            const displayText = `${item.quantity} ${item.name}`.trim();
            const style = item.isAllergenFree ? 'font-weight: bold; color: #4CAF50; background: #E8F5E9; padding: 2px 5px; border-radius: 3px;' : '';
            html += `<div class="label-box-item" style="${style}">${displayText}${item.isAllergenFree ? ' ✓' : ''}</div>`;
        });
    } else {
        html += `<div class="label-box-item" style="color: #999;">-</div>`;
    }

    html += `
                        </div>
                    </div>
                </div>
            </div>

            <div class="label-footer">
                <div class="label-notes">${kashrutText}</div>
                <div class="label-delivery">קו חלוקה: ${customer.distrLine} | סדר: ${customer.distrOrder}</div>
            </div>
        </div>
        </div>
    `;

    return html;
}

// פורמט תאריך
function formatDate(dateString) {
    if (!dateString) return '';
    const date = new Date(dateString);
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `${day}/${month}/${year}`;
}

// הצגת סטטוס
function showStatus(message, type) {
    const statusDiv = document.getElementById('status');
    statusDiv.textContent = message;
    statusDiv.className = `status ${type}`;

    if (type === 'success') {
        setTimeout(() => {
            statusDiv.style.display = 'none';
        }, 3000);
    } else {
        statusDiv.style.display = 'block';
    }
}

// הצגת מידע תוצאות
function showResultsInfo(count) {
    const infoDiv = document.getElementById('resultsInfo');
    infoDiv.textContent = `נמצאו ${count} מדבקות`;
    infoDiv.className = 'results-info show';
}

function hideResultsInfo() {
    const infoDiv = document.getElementById('resultsInfo');
    infoDiv.className = 'results-info';
}
</script>

</body>
</html>
