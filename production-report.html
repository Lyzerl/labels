<script src="js/config.js"></script>
<script>
// משתנים גלובליים
let reportData = null;
let workingDays = [];
let allDaysDataGlobal = []; // שמירת הנתונים לכל הימים
let productOrdersData = {}; // שמירת ההזמנות לכל מוצר בכל יום

// חישוב 4 ימי עבודה קדימה (ראשון עד חמישי) - מתחילים מהיום הבא
function calculateWorkingDays() {
    const days = [];
    const today = new Date();
    let currentDate = new Date(today);

    // מתחילים מהיום הבא (לא כולל היום)
    currentDate.setDate(currentDate.getDate() + 1);

    while (days.length < 4) {
        const dayOfWeek = currentDate.getDay(); // 0 = ראשון, 6 = שבת

        // ימים 0-4 הם ראשון עד חמישי (ימי עבודה)
        if (dayOfWeek >= 0 && dayOfWeek <= 4) {
            days.push(new Date(currentDate));
        }

        // עוברים ליום הבא
        currentDate.setDate(currentDate.getDate() + 1);
    }

    return days;
}

// פורמט תאריך לעברית
function formatDateHebrew(date) {
    const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
    const dayName = days[date.getDay()];
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const year = date.getFullYear();
    return `יום ${dayName} ${day}/${month}/${year}`;
}

// פורמט תאריך קצר
function formatDateShort(date) {
    const days = ['ראשון', 'שני', 'שלישי', 'רביעי', 'חמישי', 'שישי', 'שבת'];
    const dayName = days[date.getDay()];
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0');
    return `יום ${dayName} (${day}/${month})`;
}

// פורמט תאריך ל-API
function formatDateForAPI(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

// עדכון תצוגת טווח התאריכים
function updateDateRangeDisplay() {
    workingDays = calculateWorkingDays();
    const infoDiv = document.getElementById('dateRangeInfo');

    if (workingDays.length >= 4) {
        const firstDate = formatDateHebrew(workingDays[0]);
        const lastDate = formatDateHebrew(workingDays[3]);
        infoDiv.innerHTML = `<strong>טווח תאריכים:</strong> ${firstDate} עד ${lastDate}`;
    }
}

// משיכת נתונים מהשרת - דרך helper משותף
// כולל: $orderby ל-pagination יציב, סינון סניף מפורש, retry, אימות ספירה
async function fetchDataForDate(date, branch) {
    const dateStr = formatDateForAPI(date);

    const result = await fetchPriorityData({
        date: dateStr,
        branchSelect: branch,
        retries: 2
    });

    // צבירת מידע אימות לכל יום - להצגה למשתמש בסיום
    if (!window._productionReportWarnings) window._productionReportWarnings = [];
    if (!window._productionReportCountInfo) window._productionReportCountInfo = [];

    window._productionReportCountInfo.push({
        date: dateStr,
        actual: result.data.length,
        expected: result.expectedCount,
        verified: result.countVerified,
        error: result.countError
    });

    // אזהרות - לוגים מובנים
    if (result.issues && result.issues.length > 0) {
        if (typeof console.error === 'function') {
            console.error(`⚠️ אזהרות ביום ${dateStr}:`, result.issues);
        }
        result.issues.forEach(issue => {
            window._productionReportWarnings.push(`${dateStr}: ${issue}`);
        });
    }

    // אם יש אי-התאמה בספירה ביום מסוים - זרוק שגיאה ברורה
    if (result.expectedCount !== null && result.countVerified === false) {
        const diff = result.expectedCount - result.data.length;
        if (diff > 0) {
            throw new Error(`אי-התאמה בספירה ליום ${dateStr}: נמשכו ${result.data.length} מתוך ${result.expectedCount} צפויות (חסרות ${diff})`);
        }
    }

    return result.data;
}

// סינון רק פריטים חמים - משתמש בפונקציה מ-DEFINITIONS שבודקת כל השדות הרלוונטיים
function filterHotItems(data) {
    return data.filter(row => {
        // משתמשים בפונקציה isHotItem מ-DEFINITIONS שבודקת:
        // CARTON_TYPE, PSPEC6, PSPEC3
        return DEFINITIONS.isHotItem(row);
    });
}

// סינון לפי סוג לקוח - מילגם / פרטיים / הכל
// הזיהוי לפי שדה SPEC1 (סוג לקוח)
function filterByCustomerType(data, customerType) {
    if (!customerType || customerType === 'all') return data;

    return data.filter(row => {
        const spec1 = String(row.SPEC1 || '').toLowerCase();
        const isMilgam = spec1.includes('מילגם');

        if (customerType === 'milgam') return isMilgam;
        if (customerType === 'private') return !isMilgam;
        return true;
    });
}

// עיבוד הנתונים לטבלה מסכמת - ליום אחד
// מפריד בין: גסטרונום, מארזים (5 ו-7), מיכלים רגילים, חמגשיות
// חשוב:
// - אם אותו מוצר באותה הזמנה עם כמה שורות (סוגי אריזה) - סופר פעם אחת
// - אם אותו מוצר באותה הזמנה בכמה ארוחות - סופר כל ארוחה בנפרד
// - אם אותו מוצר מכמה הזמנות - מסכם יחד בטבלה
// - בסניף דרום: גסטרונום עם מארזים 5/7 מסוכם יחד עם המארזים
function processDataForDay(dayData, dayIndex, branch = 'all') {
    const isSouthBranch = (branch === 'south');

    // שלב 1: איחוד שורות לפי הזמנה+מוצר+ארוחה
    // מפתח ייחודי = ORDNAME + PARTDES + MEALNAME (כל ארוחה נספרת בנפרד)
    const uniqueItems = {};

    dayData.forEach(row => {
        const productName = String(row.PARTDES || '').trim();
        if (!productName) return;

        const orderName = String(row.ORDNAME || '');
        const mealName = String(row.MEALNAME || '');
        // מפתח ייחודי כולל ארוחה - כל ארוחה נספרת בנפרד
        const uniqueKey = `${orderName}|${productName}|${mealName}`;

        // אם כבר ראינו את השילוב הזה - מדלגים
        if (uniqueItems[uniqueKey]) return;

        // שומרים את השורה הראשונה של השילוב הזה
        uniqueItems[uniqueKey] = row;
    });

    // שלב 2: עיבוד הנתונים המאוחדים
    // מוצרי גסטרונום - נפרד
    const gastronormProducts = {};
    // מוצרי מארזים (5 ו-7) - ללא מיכלים
    const packProducts = {};
    // מוצרי מיכלים רגילים - רק אם אין מארזים
    const containerProducts = {};
    // חמגשיות
    const trayProducts = {};

    Object.values(uniqueItems).forEach(row => {
        const productName = String(row.PARTDES || '').trim();

        const orderName = row.ORDNAME || '';
        const mealName = row.MEALNAME || '';

        // בדיקה אם זה חמגשית אלרגנית - מדלגים עליה
        const pspec1 = String(row.PSPEC1 || '').toLowerCase();
        const pspec2 = String(row.PSPEC2 || '').toLowerCase();
        const spec2 = String(row.SPEC2 || '').toLowerCase();
        const packMethod = String(row.PACKMETHODCODE || '').toLowerCase();
        const packDes = String(row.PACKDES || '').toLowerCase();
        const isTray = packMethod.includes('חמגשית');
        const isAllergen = pspec2.includes('אלרגנ') || spec2.includes('אלרגנ');

        // מדלגים על חמגשיות אלרגניות
        if (isTray && isAllergen) return;

        // זיהוי שיטת אריזה גסטרונום
        // ירק שאריזתו גסטרונום - מתייחסים אליו כתפזורת (לא כגסטרונום)
        const isVeggie = pspec1.includes('ירק');
        const isGastronormRaw = packMethod.includes('גסטרונום') || packDes.includes('גסטרונום') || pspec1.includes('גסטרונום');
        const isGastronorm = isGastronormRaw && !isVeggie;

        // בדיקה אם זה לקוח חב"ד עם מנה עיקרית בשרית - מתייחסים כתפזורת
        // PSPEC3 מכיל את הפרמטר של בשרי/פרווה
        const pspec3 = String(row.PSPEC3 || '').toLowerCase();
        const isChabad = spec2.includes('חבד') || spec2.includes('חב"ד');
        const isMeatMain = pspec3.includes('בשרי');
        const isChabadMeatTray = isChabad && isMeatMain && isTray;

        // שמירת פרטי ההזמנה לפופאפ
        const orderKey = `${dayIndex}_${productName}`;
        if (!productOrdersData[orderKey]) {
            productOrdersData[orderKey] = [];
        }

        // בדיקה אם ההזמנה+ארוחה כבר קיימת
        const existingOrder = productOrdersData[orderKey].find(o =>
            o.orderName === orderName && o.mealName === mealName
        );
        if (!existingOrder) {
            productOrdersData[orderKey].push({
                orderName: orderName,
                mealName: mealName,
                custDes: row.CUSTDES || '',
                custName: row.CUSTNAME || '',
                quantity: parseFloat(row.TQUANT) || 0,
                eatQuant: parseFloat(row.EATQUANT) || 0
            });
        }

        // חישוב הערכים
        const tquant = parseFloat(row.TQUANT) || 0;
        const eatQuant = parseFloat(row.EATQUANT) || 0;
        const param7 = parseFloat(row.Y_9964_5_ESH) || 0;
        const param8 = parseFloat(row.Y_9965_5_ESH) || 0;

        // בדיקה אם יש פרמטר 8 (מארזים)
        const hasPacks = param8 > 0;

        // חמגשיות - נפרד (אלא אם זה חב"ד עם מנה בשרית - אז מתייחסים כתפזורת)
        // חשוב: חמגשיות לא נספרות במארזים גם בדרום!
        if (isTray && !isAllergen && !isChabadMeatTray) {
            if (!trayProducts[productName]) {
                trayProducts[productName] = { name: productName, trays: 0 };
            }
            trayProducts[productName].trays += eatQuant;
            return; // חמגשיות לא נספרות במיכלים/מארזים
        }

        // חב"ד עם מנה בשרית בחמגשית - מתייחסים כתפזורת (ממשיכים לבדיקות הבאות)

        // בסניף דרום: כל פריט עם מארזים (חוץ מחמגשית שכבר טופלה למעלה) - מסוכם במארזים
        // זה כולל גם פריטים בשיטת אריזה גסטרונום!
        if (isSouthBranch && hasPacks) {
            if (!packProducts[productName]) {
                packProducts[productName] = { name: productName, pack5: 0, pack7: 0, packWeight: 0 };
            }
            // חישוב מארזים
            if (tquant > 0) {
                const totalServings = Math.ceil(tquant / param8);
                const optimized = DEFINITIONS.calculateOptimalPacks(totalServings);
                packProducts[productName].pack5 += optimized.five;
                packProducts[productName].pack7 += optimized.seven;
                packProducts[productName].packWeight += tquant;
            }
            return; // סוכם במארזים
        }

        // גסטרונום (בצפון או בלי מארזים) - נפרד
        if (isGastronorm) {
            if (!gastronormProducts[productName]) {
                gastronormProducts[productName] = { name: productName, containers: 0, weight: 0 };
            }
            // חישוב מיכלי גסטרונום
            let containers = 0;
            if (tquant > 0 && param7 > 0) {
                const divisionResult = tquant / param7;
                containers = Math.ceil(divisionResult / 6.5);
            }
            gastronormProducts[productName].containers += containers;
            gastronormProducts[productName].weight += tquant;
            return; // גסטרונום לא נספר במארזים/מיכלים רגילים
        }

        if (hasPacks) {
            // מארזים 5 ו-7
            if (!packProducts[productName]) {
                packProducts[productName] = { name: productName, pack5: 0, pack7: 0, packWeight: 0 };
            }
            // חישוב מארזים
            if (tquant > 0) {
                const totalServings = Math.ceil(tquant / param8);
                const optimized = DEFINITIONS.calculateOptimalPacks(totalServings);
                packProducts[productName].pack5 += optimized.five;
                packProducts[productName].pack7 += optimized.seven;
                packProducts[productName].packWeight += tquant;
            }
        } else {
            // מיכלים רגילים - רק אם אין מארזים
            if (!containerProducts[productName]) {
                containerProducts[productName] = { name: productName, containers: 0, weight: 0 };
            }
            // חישוב מיכלים
            let containers = 0;
            if (tquant > 0 && param7 > 0) {
                const divisionResult = tquant / param7;
                containers = Math.ceil(divisionResult / 2); // מיכל רגיל - חילוק ב-2
            }
            containerProducts[productName].containers += containers;
            containerProducts[productName].weight += tquant;
        }
    });

    return {
        gastronorm: gastronormProducts,
        packs: packProducts,
        containers: containerProducts,
        trays: trayProducts
    };
}

// פתיחת פופאפ הזמנות
function openItemModal(productName, dayIndex) {
    const modal = document.getElementById('itemModal');
    const modalTitle = document.getElementById('modalTitle');
    const modalBody = document.getElementById('modalBody');

    if (!modal || !modalTitle || !modalBody) return;

    const safeProductName = String(productName || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const dayDate = workingDays[dayIndex] ? formatDateHebrew(workingDays[dayIndex]) : '';
    modalTitle.textContent = `הזמנות - ${safeProductName}`;

    const orderKey = `${dayIndex}_${productName}`;
    const ordersData = productOrdersData[orderKey];

    let html = '';

    if (ordersData && ordersData.length > 0) {
        // כותרת עם התאריך
        html += `<div style="background:#e3f2fd;padding:10px;border-radius:5px;margin-bottom:15px;text-align:center;font-weight:bold;">${dayDate}</div>`;

        // מיון לפי שם לקוח
        const sortedOrders = ordersData.sort((a, b) => {
            const nameA = String(a.custDes || '').trim();
            const nameB = String(b.custDes || '').trim();
            return nameA.localeCompare(nameB, 'he');
        });

        sortedOrders.forEach(order => {
            const orderName = String(order.orderName || 'ללא').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const custDes = String(order.custDes || 'ללא').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const custName = String(order.custName || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            const mealName = String(order.mealName || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
            html += '<div class="modal-item">';
            html += `<strong>הזמנה: ${orderName}</strong>`;
            html += `<span>לקוח: ${custDes}</span>`;
            if (custName) {
                html += `<span>מספר לקוח: ${custName}</span>`;
            }
            if (mealName) {
                html += `<span>ארוחה: ${mealName}</span>`;
            }
            if (order.quantity > 0) {
                html += `<span>כמות: ${order.quantity.toFixed(1)}</span>`;
            }
            html += '</div>';
        });

        html += `<div style="margin-top:15px;padding:10px;background:#e8f5e9;border-radius:5px;text-align:center;font-weight:bold;">סה"כ: ${sortedOrders.length} הזמנות</div>`;
    } else {
        html = '<p style="text-align:center;padding:20px;color:#999;">אין נתונים להצגה</p>';
    }

    modalBody.innerHTML = html;
    modal.classList.add('active');
}

// סגירת פופאפ
function closeItemModal() {
    const modal = document.getElementById('itemModal');
    if (modal) {
        modal.classList.remove('active');

}

document.addEventListener('DOMContentLoaded', function() {

// בניית טבלה ליום אחד - עם הפרדה לסקציות
function buildDayTable(dayProducts, date, dayIndex) {
    const { gastronorm, packs, containers, trays } = dayProducts;

    const hasGastronorm = Object.keys(gastronorm).length > 0;
    const hasPacks = Object.keys(packs).length > 0;
    const hasContainers = Object.keys(containers).length > 0;
    const hasTrays = Object.keys(trays).length > 0;

    if (!hasGastronorm && !hasPacks && !hasContainers && !hasTrays) {
        return {
            html: `
                <div class="day-table-container">
                    <div class="day-title">${formatDateHebrew(date)}</div>
                    <p style="text-align:center;padding:20px;color:#999;background:#fafafa;border:2px solid #333;border-top:none;">לא נמצאו נתונים</p>
                </div>
            `,
            totals: { gastronormContainers: 0, gastronormWeight: 0, containers: 0, containerWeight: 0, pack5: 0, pack7: 0, packWeight: 0, trays: 0 }
        };
    }

    let html = `<div class="day-table-container">`;
    html += `<div class="day-title">${formatDateHebrew(date)}</div>`;

    const totals = {
        gastronormContainers: 0,
        gastronormWeight: 0,
        containers: 0,
        containerWeight: 0,
        pack5: 0,
        pack7: 0,
        packWeight: 0,
        trays: 0
    };

    // טבלת גסטרונום
    if (hasGastronorm) {
        html += '<div class="section-title gastronorm">🍱 גסטרונום</div>';
        html += '<table class="report-table">';
        html += '<thead><tr>';
        html += '<th class="product-col">מוצר</th>';
        html += '<th>מיכלים</th>';
        html += '<th>משקל (ק"ג)</th>';
        html += '</tr></thead><tbody>';

        const sortedGastronorm = Object.values(gastronorm).sort((a, b) => a.name.localeCompare(b.name, 'he'));
        sortedGastronorm.forEach(product => {
            const escapedName = product.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
            html += '<tr>';
            html += `<td class="product-name" onclick="openItemModal('${escapedName}', ${dayIndex})" title="לחץ לצפייה בהזמנות">${product.name}</td>`;
            html += `<td>${product.containers > 0 ? product.containers : '-'}</td>`;
            html += `<td>${product.weight > 0 ? product.weight.toFixed(1) : '-'}</td>`;
            html += '</tr>';
            totals.gastronormContainers += product.containers;
            totals.gastronormWeight += product.weight;
        });

        html += '<tr>';
        html += '<td class="total-row">סה"כ גסטרונום</td>';
        html += `<td class="total-row">${totals.gastronormContainers}</td>`;
        html += `<td class="total-row">${totals.gastronormWeight.toFixed(1)}</td>`;
        html += '</tr></tbody></table>';
    }

    // טבלת מארזים (5 ו-7)
    if (hasPacks) {
        html += '<div class="section-title">📦 מארזים</div>';
        html += '<table class="report-table">';
        html += '<thead><tr>';
        html += '<th class="product-col">מוצר</th>';
        html += '<th>מארז 5</th>';
        html += '<th>מארז 7</th>';
        html += '<th>משקל (ק"ג)</th>';
        html += '</tr></thead><tbody>';

        const sortedPacks = Object.values(packs).sort((a, b) => a.name.localeCompare(b.name, 'he'));
        sortedPacks.forEach(product => {
            const escapedName = product.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
            html += '<tr>';
            html += `<td class="product-name" onclick="openItemModal('${escapedName}', ${dayIndex})" title="לחץ לצפייה בהזמנות">${product.name}</td>`;
            html += `<td>${product.pack5 > 0 ? product.pack5 : '-'}</td>`;
            html += `<td>${product.pack7 > 0 ? product.pack7 : '-'}</td>`;
            html += `<td>${product.packWeight > 0 ? product.packWeight.toFixed(1) : '-'}</td>`;
            html += '</tr>';
            totals.pack5 += product.pack5;
            totals.pack7 += product.pack7;
            totals.packWeight += product.packWeight;
        });

        html += '<tr>';
        html += '<td class="total-row">סה"כ מארזים</td>';
        html += `<td class="total-row">${totals.pack5}</td>`;
        html += `<td class="total-row">${totals.pack7}</td>`;
        html += `<td class="total-row">${totals.packWeight.toFixed(1)}</td>`;
        html += '</tr></tbody></table>';
    }

    // טבלת מיכלים רגילים
    if (hasContainers) {
        html += '<div class="section-title">🥡 מיכלים</div>';
        html += '<table class="report-table">';
        html += '<thead><tr>';
        html += '<th class="product-col">מוצר</th>';
        html += '<th>מיכלים</th>';
        html += '<th>משקל (ק"ג)</th>';
        html += '</tr></thead><tbody>';

        const sortedContainers = Object.values(containers).sort((a, b) => a.name.localeCompare(b.name, 'he'));
        sortedContainers.forEach(product => {
            const escapedName = product.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
            html += '<tr>';
            html += `<td class="product-name" onclick="openItemModal('${escapedName}', ${dayIndex})" title="לחץ לצפייה בהזמנות">${product.name}</td>`;
            html += `<td>${product.containers > 0 ? product.containers : '-'}</td>`;
            html += `<td>${product.weight > 0 ? product.weight.toFixed(1) : '-'}</td>`;
            html += '</tr>';
            totals.containers += product.containers;
            totals.containerWeight += product.weight;
        });

        html += '<tr>';
        html += '<td class="total-row">סה"כ מיכלים</td>';
        html += `<td class="total-row">${totals.containers}</td>`;
        html += `<td class="total-row">${totals.containerWeight.toFixed(1)}</td>`;
        html += '</tr></tbody></table>';
    }

    // טבלת חמגשיות
    if (hasTrays) {
        html += '<div class="section-title">🍽️ חמגשיות</div>';
        html += '<table class="report-table">';
        html += '<thead><tr>';
        html += '<th class="product-col">מוצר</th>';
        html += '<th>כמות מנות</th>';
        html += '</tr></thead><tbody>';

        const sortedTrays = Object.values(trays).sort((a, b) => a.name.localeCompare(b.name, 'he'));
        sortedTrays.forEach(product => {
            const escapedName = product.name.replace(/'/g, "\\'").replace(/"/g, '\\"');
            html += '<tr>';
            html += `<td class="product-name" onclick="openItemModal('${escapedName}', ${dayIndex})" title="לחץ לצפייה בהזמנות">${product.name}</td>`;
            html += `<td>${product.trays > 0 ? product.trays : '-'}</td>`;
            html += '</tr>';
            totals.trays += product.trays;
        });

        html += '<tr>';
        html += '<td class="total-row">סה"כ חמגשיות</td>';
        html += `<td class="total-row">${totals.trays}</td>`;
        html += '</tr></tbody></table>';
    }

    html += '</div>';

    return { html, totals };
}

// טעינת הדוח
async function loadReport() {
    const statusDiv = document.getElementById('status');
    const reportContainer = document.getElementById('reportContainer');
    const loadBtn = document.getElementById('loadBtn');
    const printBtn = document.getElementById('printBtn');
    const csvBtn = document.getElementById('csvBtn');
    const branchSelect = document.getElementById('branchSelect').value;
    const customerTypeSelect = document.getElementById('customerTypeSelect').value;

    loadBtn.disabled = true;
    printBtn.disabled = true;
    csvBtn.disabled = true;
    statusDiv.className = 'status loading';
    statusDiv.innerHTML = 'טוען נתונים מהשרת...';
    reportContainer.innerHTML = '';
    document.getElementById('summaryCards').style.display = 'none';

    // איפוס נתוני ההזמנות
    productOrdersData = {};
    // איפוס אזהרות ומידע אימות מהריצה הקודמת
    window._productionReportWarnings = [];
    window._productionReportCountInfo = [];

    try {
        // משיכת נתונים לכל 4 הימים
        allDaysDataGlobal = [];
        reportData = [];

        let allHTML = '';
        const grandTotal = {
            gastronormContainers: 0,
            gastronormWeight: 0,
            containers: 0,
            containerWeight: 0,
            pack5: 0,
            pack7: 0,
            packWeight: 0,
            trays: 0
        };

        for (let i = 0; i < workingDays.length; i++) {
            statusDiv.innerHTML = `טוען נתונים ליום ${i + 1} מתוך 4...`;
            const dayData = await fetchDataForDate(workingDays[i], branchSelect);
            // סינון לפי סוג לקוח (מילגם / פרטיים / הכל)
            const filteredByCustomer = filterByCustomerType(dayData, customerTypeSelect);
            // סינון רק פריטים חמים
            const hotData = filterHotItems(filteredByCustomer);
            allDaysDataGlobal.push(hotData);

            // עיבוד הנתונים ליום זה (עם שמירת הזמנות)
            const dayProducts = processDataForDay(hotData, i, branchSelect);
            reportData.push(dayProducts);

            // בניית הטבלה ליום זה
            const result = buildDayTable(dayProducts, workingDays[i], i);
            allHTML += result.html;

            // צבירת סיכומים כלליים
            grandTotal.gastronormContainers += result.totals.gastronormContainers;
            grandTotal.gastronormWeight += result.totals.gastronormWeight;
            grandTotal.containers += result.totals.containers;
            grandTotal.containerWeight += result.totals.containerWeight;
            grandTotal.pack5 += result.totals.pack5;
            grandTotal.pack7 += result.totals.pack7;
            grandTotal.packWeight += result.totals.packWeight;
            grandTotal.trays += result.totals.trays;
        }

        reportContainer.innerHTML = allHTML;

        // עדכון כרטיסי סיכום
        updateSummaryCards(grandTotal);

        const totalProducts = new Set();
        reportData.forEach(day => {
            Object.keys(day.gastronorm).forEach(p => totalProducts.add(p));
            Object.keys(day.packs).forEach(p => totalProducts.add(p));
            Object.keys(day.containers).forEach(p => totalProducts.add(p));
            Object.keys(day.trays).forEach(p => totalProducts.add(p));
        });

        // ===== הצגת סיכום אימות הספירה =====
        const countInfo = window._productionReportCountInfo || [];
        const allVerified = countInfo.length > 0 && countInfo.every(c => c.verified === true);
        const anyMismatch = countInfo.some(c => c.expected !== null && c.verified === false);
        const allUnverified = countInfo.length > 0 && countInfo.every(c => c.expected === null || c.expected === undefined);

        let statusHtml = '';
        if (allVerified) {
            const totalActual = countInfo.reduce((s, c) => s + c.actual, 0);
            const totalExpected = countInfo.reduce((s, c) => s + (c.expected || 0), 0);
            statusHtml = `נטענו ${totalProducts.size} מוצרים חמים ל-4 ימים `
                       + `<span style="color:#2e7d32">(✅ ${totalActual}/${totalExpected} שורות אומתו מול השרת)</span>`;
            statusDiv.className = 'status success';
        } else if (anyMismatch) {
            statusHtml = `❌ <strong>אי-התאמה בספירה ביום אחד או יותר!</strong><br>`;
            countInfo.forEach(c => {
                if (c.expected !== null && c.verified === false) {
                    statusHtml += `<small style="color:#d32f2f">• ${c.date}: ${c.actual}/${c.expected} (חסרות ${c.expected - c.actual})</small><br>`;
                }
            });
            statusDiv.className = 'status error';
        } else if (allUnverified) {
            statusHtml = `נטענו ${totalProducts.size} מוצרים חמים ל-4 ימים `
                       + `<span style="color:#f57c00">(⚠️ ספירה לא אומתה - ה-Worker לא תומך ב-$count)</span>`;
            statusDiv.className = 'status success';
        } else {
            statusHtml = `נטענו ${totalProducts.size} מוצרים חמים ל-4 ימים`;
            statusDiv.className = 'status success';
        }

        // הצגת אזהרות אימות אם זוהו
        const warnings = window._productionReportWarnings || [];
        if (warnings.length > 0) {
            statusHtml += '<br><br><strong style="color:#d32f2f">⚠️ אזהרות:</strong><br>';
            statusHtml += warnings.map(w => `<small style="color:#d32f2f">• ${w}</small>`).join('<br>');
        }

        statusDiv.innerHTML = statusHtml;

        printBtn.disabled = false;
        csvBtn.disabled = false;

    } catch (error) {
        console.error('שגיאה בטעינת הדוח:', error);
        statusDiv.className = 'status error';
        statusDiv.innerHTML = `שגיאה: ${error.message}`;
    } finally {
        loadBtn.disabled = false;
    }
}

// הדפסת הדוח
function printReport() {
    window.print();
}

// הורדת CSV
function downloadCSV() {
    if (!reportData || reportData.length === 0) return;

    let csv = '\uFEFF'; // BOM for UTF-8

    // עבור כל יום - טבלאות נפרדות
    workingDays.forEach((date, dayIndex) => {
        const dayProducts = reportData[dayIndex];
        if (!dayProducts) return;

        csv += `\n${formatDateHebrew(date)}\n`;

        // גסטרונום
        if (Object.keys(dayProducts.gastronorm).length > 0) {
            csv += '\nגסטרונום\n';
            csv += 'מוצר,מיכלים,משקל\n';
            Object.values(dayProducts.gastronorm).sort((a, b) => a.name.localeCompare(b.name, 'he')).forEach(product => {
                csv += `"${product.name}",${product.containers},${product.weight.toFixed(1)}\n`;
            });
        }

        // מארזים
        if (Object.keys(dayProducts.packs).length > 0) {
            csv += '\nמארזים\n';
            csv += 'מוצר,מארז 5,מארז 7,משקל\n';
            Object.values(dayProducts.packs).sort((a, b) => a.name.localeCompare(b.name, 'he')).forEach(product => {
                csv += `"${product.name}",${product.pack5},${product.pack7},${product.packWeight.toFixed(1)}\n`;
            });
        }

        // מיכלים
        if (Object.keys(dayProducts.containers).length > 0) {
            csv += '\nמיכלים\n';
            csv += 'מוצר,מיכלים,משקל\n';
            Object.values(dayProducts.containers).sort((a, b) => a.name.localeCompare(b.name, 'he')).forEach(product => {
                csv += `"${product.name}",${product.containers},${product.weight.toFixed(1)}\n`;
            });
        }

        // חמגשיות
        if (Object.keys(dayProducts.trays).length > 0) {
            csv += '\nחמגשיות\n';
            csv += 'מוצר,כמות\n';
            Object.values(dayProducts.trays).sort((a, b) => a.name.localeCompare(b.name, 'he')).forEach(product => {
                csv += `"${product.name}",${product.trays}\n`;
            });
        }

        csv += '\n';
    });

    // הורדה
    const branchSelect = document.getElementById('branchSelect').value;
    const branchName = branchSelect === 'south' ? 'דרום' : branchSelect === 'north' ? 'צפון' : 'הכל';
    const customerType = document.getElementById('customerTypeSelect').value;
    const customerName = customerType === 'milgam' ? '_מילגם' : customerType === 'private' ? '_פרטיים' : '';
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `דוח_ייצור_חם_${branchName}${customerName}_${formatDateForAPI(new Date())}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
